events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 1. Reindirizzamento automatico da HTTP (80) a HTTPS (443)
    server {
        listen 80;
        server_name registro.clienti.it;
        return 301 https://$host$request_uri;
    }

    # 2. Configurazione HTTPS Centralizzata
    server {
        listen 443 ssl;
        server_name registro.clienti.it;

        # Certificati SSL fittizi
        ssl_certificate /etc/nginx/certs/registro.crt;
        ssl_certificate_key /etc/nginx/certs/registro.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Gestione del Frontend (Pagine Statiche)
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Gestione del Reverse Proxy verso il Backend Spring Boot
        location /api/ {
            proxy_pass http://backend:8095; # Usa il nome del servizio Docker
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}