version: '3.8'

networks:
  rete-laboratorio:
    driver: bridge

volumes:
  db_data:

services:
  # 1. DATABASE: MariaDB (Invariato)
  mariadb_servizio:
    image: mariadb:11.2
    container_name: mariadb_container
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - rete-laboratorio
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: azienda_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. INTERFACCIA WEB DB: phpMyAdmin (Invariato)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_container
    restart: unless-stopped
    networks:
      - rete-laboratorio
    environment:
      PMA_HOST: mariadb_servizio
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      mariadb_servizio:
        condition: service_healthy

  # 3. BACKEND: Spring Boot (MODIFICATO: Blindato all'interno della rete)
  backend:
    build: ./backend
    container_name: spring_backend_container
    restart: unless-stopped
    networks:
      - rete-laboratorio
    expose:
      - "8095" # Ora è accessibile SOLO da Nginx, nessuna porta esposta su Windows
    depends_on:
      mariadb_servizio:
        condition: service_healthy

  # 4. FRONTEND / REVERSE PROXY: Nginx (MODIFICATO: Gestisce HTTPS e smistamento)
  frontend:
    image: nginx:latest
    container_name: nginx_frontend_container
    restart: unless-stopped
    networks:
      - rete-laboratorio
    ports:
      - "80:80"    # Riceve il traffico HTTP standard per fare il redirect a HTTPS
      - "443:443"  # Riceve il traffico HTTPS sicuro per il dominio registro.clienti.it
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend