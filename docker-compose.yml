version: '3.8'

networks:
  rete-laboratorio:
    driver: bridge

volumes:
  db_data:

services:
  # 1. DATABASE: MariaDB (Con Healthcheck e Restart)
  mariadb_servizio:
    image: mariadb:11.2
    container_name: mariadb_container
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - rete-laboratorio
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: azienda_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    # Controllo di salute: esegue un ping interno per capire quando il DB accetta connessioni
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. INTERFACCIA WEB DB: phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_container
    restart: unless-stopped
    networks:
      - rete-laboratorio
    environment:
      PMA_HOST: mariadb_servizio
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      mariadb_servizio:
        condition: service_healthy

  # 3. BACKEND: Spring Boot (Parte SOLO quando MariaDB è realmente pronto)
  backend:
    build: ./backend # Cartella dove è presente il Dockerfile
    container_name: spring_backend_container
    restart: unless-stopped
    networks:
      - rete-laboratorio
    ports:
      - "8095:8095"
    depends_on:
      mariadb_servizio:
        condition: service_healthy

  # 4. FRONTEND: Nginx Standard
  frontend:
    image: nginx:latest
    container_name: nginx_frontend_container
    restart: unless-stopped
    networks:
      - rete-laboratorio
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html